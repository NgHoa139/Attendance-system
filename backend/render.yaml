services:
  - type: web
    name: attendance-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python create_tables.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: AES_KEY
        sync: false
      - key: AES_IV
        sync: false
