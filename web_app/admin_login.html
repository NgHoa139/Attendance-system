<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Điểm Danh Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1" style="background: radial-gradient(circle, rgba(239,68,68,0.8) 0%, rgba(185,28,28,0) 70%);"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="glass-container">
        <header>
            <div class="logo-circle" style="background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);">
                <span class="logo-text">ADMIN</span>
            </div>
            <h1>Hệ thống Quản trị</h1>
            <p>Đăng nhập với quyền Quản trị viên</p>
        </header>
        
        <main>
            <form id="adminLoginForm">
                <div class="input-group">
                    <label>TÀI KHOẢN</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                
                <div class="input-group">
                    <label>MẬT KHẨU</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                
                <button type="submit" class="btn-primary" style="background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 8px 32px rgba(239, 68, 68, 0.4);">
                    <span id="btnText">ĐĂNG NHẬP</span>
                    <div class="btn-glow"></div>
                </button>
            </form>
            <div id="loginMessage" style="text-align:center; margin-top:16px; font-size:14px; color:var(--error);"></div>
        </main>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="login.html" style="color: var(--text-sub); text-decoration: none; font-size: 13px;">&larr; Dành cho sinh viên</a>
        </div>
    </div>

    <script src="app.js?v=3"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btnText = document.getElementById('btnText');
            const message = document.getElementById('loginMessage');
            
            btnText.innerText = 'ĐANG XỬ LÝ...';
            message.innerText = '';
            
            try {
                const res = await fetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('adminToken', data.access_token);
                    window.location.href = 'admin.html';
                } else {
                    message.innerText = data.detail || 'Sai tài khoản hoặc mật khẩu';
                    btnText.innerText = 'ĐĂNG NHẬP';
                }
            } catch (err) {
                message.innerText = 'Lỗi kết nối máy chủ';
                btnText.innerText = 'ĐĂNG NHẬP';
            }
        });
    </script>
</body>
</html>
