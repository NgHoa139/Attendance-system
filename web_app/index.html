<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm Danh Web - ĐH FPT</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- CryptoJS (for AES & HMAC) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 32px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: left;
        }
        .modal h2 { margin-bottom: 20px; font-size: 22px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-sub); }
        .form-group input { 
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; 
        }
        .btn-modal { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), #6366f1); border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-close { width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="glass-container">
        <header>
            <div class="logo-circle">
                <span class="logo-text">FPT</span>
            </div>
            <h1>Hệ thống Điểm danh</h1>
            <p>Sinh viên: <strong id="studentCodeDisplay">Đang tải...</strong></p>
            <div style="margin-top:12px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
                <button onclick="window.location.href='dashboard.html'" style="padding:7px 18px;background:rgba(108,99,255,0.15);border:1px solid rgba(108,99,255,0.4);border-radius:20px;color:#c4b5fd;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:background 0.2s;" onmouseover="this.style.background='rgba(108,99,255,0.3)'" onmouseout="this.style.background='rgba(108,99,255,0.15)'">📊 Thống Kê</button>
                <button onclick="openChangePasswordModal()" style="padding:7px 18px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);border-radius:20px;color:#fcd34d;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:background 0.2s;" onmouseover="this.style.background='rgba(245,158,11,0.3)'" onmouseout="this.style.background='rgba(245,158,11,0.15)'">🔑 Đổi Pass</button>
                <button id="btnLogout" onclick="logout()" style="padding:7px 18px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:20px;color:#fca5a5;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:background 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.3)'" onmouseout="this.style.background='rgba(239,68,68,0.15)'">🚪 Đăng Xuất</button>
            </div>
        </header>
        
        <main>
            <div class="status-card" id="statusCard">
                <div class="icon-pulse">
                    <span id="statusIcon">📍</span>
                </div>
                <h3 id="statusMessage">Sẵn sàng điểm danh</h3>
                <p id="subStatusMessage">Hệ thống sẽ lấy tọa độ và IP mạng</p>
            </div>
            
            <button class="btn-primary" id="btnAttend">
                <span>THỰC HIỆN ĐIỂM DANH</span>
                <div class="btn-glow"></div>
            </button>
        </main>
        
        <footer>
            <p>Protected by AES-256 & HMAC-SHA256</p>
        </footer>
    </div>
    
    <!-- Change Password Modal -->
    <div class="modal-overlay" id="changePasswordModal">
        <div class="modal">
            <h2>Đổi Mật Khẩu</h2>
            <form id="changePasswordForm" onsubmit="changePassword(event)">
                <div class="form-group">
                    <label>Mật khẩu cũ</label>
                    <input type="password" id="oldPassword" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <input type="password" id="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" required minlength="6">
                </div>
                <div id="pwdMsg" style="margin-bottom:10px; font-size:13px; font-weight:600; text-align:center; display:none;"></div>
                <button type="submit" class="btn-modal" id="btnChangePwd">Lưu Thay Đổi</button>
                <button type="button" class="btn-close" onclick="closeChangePasswordModal()">Hủy</button>
            </form>
        </div>
    </div>

    <!-- Tải các script logic -->
    <script src="crypto.js?v=2"></script>
    <script src="app.js?v=2"></script>
    <script>
        function logout() {
            localStorage.removeItem('userInfo');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
