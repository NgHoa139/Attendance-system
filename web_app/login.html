<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Điểm Danh ĐH FPT</title>
    <meta name="description" content="Đăng nhập vào hệ thống điểm danh thông minh của Đại học FPT.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6c63ff;
            --primary-dark: #4c46b6;
            --primary-glow: rgba(108, 99, 255, 0.4);
            --success: #22c55e;
            --error: #ef4444;
            --text-main: #f0f0ff;
            --text-sub: #a8a8c0;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f0e1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Animated Background */
        .background-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s ease-in-out infinite alternate;
        }

        .shape-1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, #6c63ff, #3b82f6);
            top: -120px;
            left: -120px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #a855f7, #ec4899);
            bottom: -100px;
            right: -80px;
            animation-delay: -4s;
        }

        .shape-3 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #06b6d4, #6c63ff);
            bottom: 30%;
            left: 20%;
            animation-delay: -7s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.08); }
        }

        /* Login Card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05);
            animation: fadeSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-circle {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 32px var(--primary-glow);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-header p {
            font-size: 14px;
            color: var(--text-sub);
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(108, 99, 255, 0.1);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--primary-glow);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        /* Status message */
        .status-msg {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .status-msg.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fca5a5;
        }

        .status-msg.loading {
            display: block;
            background: rgba(108, 99, 255, 0.15);
            border: 1px solid rgba(108, 99, 255, 0.35);
            color: #c4b5fd;
        }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-card">
        <div class="card-header">
            <div class="logo-circle">
                <span class="logo-text">FPT</span>
            </div>
            <h1>Hệ Thống Điểm Danh</h1>
            <p>Nhập thông tin để đăng nhập vào hệ thống</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="studentCode">Mã Sinh Viên</label>
                <input
                    type="text"
                    id="studentCode"
                    placeholder="Ví dụ: SE123456"
                    autocomplete="username"
                    required
                />
            </div>
            <div class="form-group">
                <label for="password">Mật Khẩu</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Nhập mật khẩu"
                    autocomplete="current-password"
                    required
                />
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                Đăng Nhập
            </button>
        </form>

        <div class="status-msg" id="statusMsg"></div>

        <div class="card-footer">
            <p>🔒 Bảo mật bởi AES-256 &amp; HMAC-SHA256</p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
